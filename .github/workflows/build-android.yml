name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nimstreak
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./nimstreak/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release-key.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Configure signing
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Patch build.gradle for signing
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          sed -i '/^android {/a\    signingConfigs {\n        release {\n            def propsFile = file("keystore.properties")\n            if (propsFile.exists()) {\n                def props = new Properties()\n                props.load(new FileInputStream(propsFile))\n                storeFile file(props["storeFile"])\n                storePassword props["storePassword"]\n                keyAlias props["keyAlias"]\n                keyPassword props["keyPassword"]\n            }\n        }\n    }' "$BUILD_GRADLE"
          sed -i '/buildTypes {/,/}/{s/release {/release {\n                signingConfig signingConfigs.release/}' "$BUILD_GRADLE"

      - name: Build APK
        run: cd android && ./gradlew assembleRelease
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Rename APK
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/nimstreak-v${APP_VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimstreak-apk
          path: nimstreak/android/app/build/outputs/apk/release/nimstreak-v*.apk
          retention-days: 5

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nimstreak-apk
          path: ./release

      - name: Find APK
        id: find_apk
        run: echo "apk_path=$(ls ./release/nimstreak-v*.apk)" >> $GITHUB_OUTPUT

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --generate-notes --title "NIMSTREAK Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        run: gh release upload ${{ github.ref_name }} "${{ steps.find_apk.outputs.apk_path }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
