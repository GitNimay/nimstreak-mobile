name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./nimstreak
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./nimstreak/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Get latest build and download APK
        run: |
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          DOWNLOAD_URL=$(echo "$BUILD_INFO" | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o nimstreak.apk "$DOWNLOAD_URL"

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --generate-notes --title "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        run: gh release upload ${{ github.ref_name }} nimstreak.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
